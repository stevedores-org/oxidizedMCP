# Copy to registry/skills.yaml or ~/.config/oxidized-mcp/registry.yaml
version: 1
environment: local
skills:
  - name: echo
    description: Local echo skill for development
    endpoint: http://127.0.0.1:9100/mcp
    enabled: true
    # Optional OCI image for local Podman fallback. When the HTTP endpoint
    # above is unreachable, the router checks `podman image exists <image>`
    # and, if cached, invokes the skill via `podman run -i --rm <image>`
    # over the MCP stdio transport. After CIRCUIT_TRIP_THRESHOLD consecutive
    # HTTP failures the router skips HTTP entirely and goes straight to
    # podman until the next successful refresh resets the breaker.
    # image: ghcr.io/example/echo-skill:latest

  # Lornu AI agent skills backed by lornu.ai-mcp HTTP MCP.
  # Start lornu-mcp-hub-rs in HTTP mode on port 8080, then enable the
  # profile that matches the repository workspace you want agents to operate in.
  #
  # - name: infra-code
  #   description: Lornu infra-code agent skill for Crossplane, Flux, ESO, GitOps review, and workspace-safe automation
  #   endpoint: http://127.0.0.1:8080/mcp
  #   enabled: true
  #
  # - name: gke-fleets
  #   description: Lornu GKE fleet agent skill for fleet membership, Gateway API, workload identity, and cluster attach workflows
  #   endpoint: http://127.0.0.1:8080/mcp
  #   enabled: true
